<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CMS | Slanted View Creator OS</title>
<link rel="icon" href="sv-eye.png"><link rel="stylesheet" href="packet11.css">
</head><body>
<div class="os-shell">
<aside class="os-sidebar">
  <div class="os-brand"><img src="sv-eye.png" alt=""><span><strong>SLANTED VIEW</strong><small>Creator OS</small></span></div>
  <nav class="os-nav">
    <a href="creator-os.html"><b>⌂</b> <span>Overview</span></a>
    <a href="cms.html" class="active"><b>✎</b> <span>CMS</span></a>
    <a href="analytics.html"><b>↗</b> <span>Analytics</span></a>
    <a href="sponsors.html"><b>$</b> <span>Sponsors</span></a>
    <a href="workspace.html"><b>▦</b> <span>Workspace</span></a>
    <a href="index.html"><b>◉</b> <span>Public Site</span></a>
  </nav>
  <div class="os-sidebar-footer"><div class="os-user"><img src="sv-eye.png" alt=""><div><strong>JJ</strong><span>Founder / Publisher</span></div></div></div>
</aside>

<main class="os-main">
<header class="os-topbar"><h1>Publishing CMS</h1><div class="os-actions"><a class="os-button" href="index.html">View Site</a><button class="os-button primary" type="button" data-export>Export</button></div></header>
<div class="os-content">
<section class="os-editor-grid">
  <article class="os-card">
    <h2>New Content</h2>
    <div class="os-field"><label for="editor-title">Headline</label><input id="editor-title" data-editor-title value="The View Everyone Missed This Week"></div>
    <div class="os-field"><label for="editor-type">Content type</label><select id="editor-type" data-editor-type><option>Commentary</option><option>TikTok</option><option>YouTube</option><option>Article</option><option>Live</option></select></div>
    <div class="os-field"><label for="editor-body">Story or script</label><textarea id="editor-body" data-editor-body>Everyone saw the clip. Almost nobody saw what happened around it. Here is the angle the timeline missed.</textarea></div>
    <div class="os-field"><label for="editor-status">Workflow status</label><select id="editor-status"><option>Idea</option><option>Recording</option><option selected>Editing</option><option>Scheduled</option><option>Published</option></select></div>
    <div class="os-actions"><button class="os-button primary" type="button" data-save-draft>Save Draft</button><button class="os-button" type="button">Schedule</button></div>
    <p data-save-message style="font-size:.65rem;color:#78d99a"></p>
  </article>
  <aside class="os-preview">
    <span class="preview-kicker" data-preview-type></span>
    <h2 data-preview-title></h2>
    <p data-preview-body></p>
    <div style="margin-top:28px;border-top:1px solid #332a38;padding-top:16px;color:#8f8492;font-size:.65rem">Live preview · Slanted View publishing template</div>
  </aside>
</section>
</div>
</main></div>
<script src="packet11.js" defer></script>
</body></html>
